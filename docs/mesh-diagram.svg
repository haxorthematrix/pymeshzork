<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320">
  <defs>
    <!-- Glow filter for nodes -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Animated dash for connections -->
    <style>
      .connection {
        stroke-dasharray: 8 4;
        animation: flow 1.5s linear infinite;
      }
      @keyframes flow {
        to { stroke-dashoffset: -24; }
      }
      .node-box {
        fill: #0a0a0a;
        stroke: #33ff33;
        stroke-width: 2;
      }
      .node-text {
        fill: #33ff33;
        font-family: monospace;
        font-size: 14px;
        text-anchor: middle;
      }
      .node-icon {
        fill: #ffcc00;
        font-family: monospace;
        font-size: 20px;
        text-anchor: middle;
      }
      .title-text {
        fill: #33ff33;
        font-family: monospace;
        font-size: 16px;
        text-anchor: middle;
        letter-spacing: 2px;
      }
      .signal-dot {
        fill: #33ff33;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="320" fill="#000"/>
  
  <!-- Title -->
  <text x="350" y="30" class="title-text">◢◤ MESHTASTIC NETWORK ◢◤</text>
  
  <!-- Connection lines (behind nodes) -->
  <!-- Top connection: Zork Slayer to Grue Hunter -->
  <line x1="150" y1="100" x2="550" y2="100" stroke="#33ff33" stroke-width="2" class="connection" filter="url(#glow)"/>
  
  <!-- Diagonal connections to middle layer -->
  <line x1="120" y1="130" x2="220" y2="170" stroke="#33ff33" stroke-width="2" class="connection"/>
  <line x1="580" y1="130" x2="480" y2="170" stroke="#33ff33" stroke-width="2" class="connection"/>
  
  <!-- Middle connection: Lamp Holder to Sword Master -->
  <line x1="280" y1="200" x2="420" y2="200" stroke="#33ff33" stroke-width="2" class="connection"/>
  
  <!-- Diagonal connections to bottom -->
  <line x1="250" y1="230" x2="310" y2="260" stroke="#33ff33" stroke-width="2" class="connection"/>
  <line x1="450" y1="230" x2="390" y2="260" stroke="#33ff33" stroke-width="2" class="connection"/>
  
  <!-- Signal dots on connections -->
  <circle cx="350" cy="100" r="4" class="signal-dot"/>
  <circle cx="350" cy="200" r="4" class="signal-dot" style="animation-delay: 0.5s"/>
  <circle cx="350" cy="280" r="4" class="signal-dot" style="animation-delay: 1s"/>
  
  <!-- Node: Zork Slayer (top left) -->
  <g filter="url(#glow)">
    <rect x="50" y="65" width="120" height="65" rx="5" class="node-box"/>
    <text x="110" y="90" class="node-icon">⚔</text>
    <text x="110" y="112" class="node-text">Zork</text>
    <text x="110" y="126" class="node-text">Slayer</text>
  </g>
  
  <!-- Node: Grue Hunter (top right) -->
  <g filter="url(#glow)">
    <rect x="530" y="65" width="120" height="65" rx="5" class="node-box"/>
    <text x="590" y="90" class="node-icon">👁</text>
    <text x="590" y="112" class="node-text">Grue</text>
    <text x="590" y="126" class="node-text">Hunter</text>
  </g>
  
  <!-- Node: Lamp Holder (middle left) -->
  <g filter="url(#glow)">
    <rect x="170" y="165" width="120" height="65" rx="5" class="node-box"/>
    <text x="230" y="190" class="node-icon">🔦</text>
    <text x="230" y="212" class="node-text">Lamp</text>
    <text x="230" y="226" class="node-text">Holder</text>
  </g>
  
  <!-- Node: Sword Master (middle right) -->
  <g filter="url(#glow)">
    <rect x="410" y="165" width="120" height="65" rx="5" class="node-box"/>
    <text x="470" y="190" class="node-icon">🗡</text>
    <text x="470" y="212" class="node-text">Sword</text>
    <text x="470" y="226" class="node-text">Master</text>
  </g>
  
  <!-- Node: Brave Soul (bottom center) -->
  <g filter="url(#glow)">
    <rect x="290" y="255" width="120" height="55" rx="5" class="node-box"/>
    <text x="350" y="280" class="node-icon">💀</text>
    <text x="350" y="300" class="node-text">Brave Soul</text>
  </g>
  
  <!-- Radio wave indicators -->
  <g opacity="0.5">
    <circle cx="110" cy="97" r="45" fill="none" stroke="#33ff33" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="590" cy="97" r="45" fill="none" stroke="#33ff33" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="350" cy="280" r="40" fill="none" stroke="#33ff33" stroke-width="1" stroke-dasharray="3 3"/>
  </g>
  
  <!-- LoRa label -->
  <text x="350" y="145" fill="#00ccff" font-family="monospace" font-size="11" text-anchor="middle">◄── LoRa 915MHz ──►</text>
</svg>
